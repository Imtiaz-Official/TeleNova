<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleNova | Neural Storage</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar hidden">
        <div class="brand">
            TELE<span>NOVA</span>
        </div>
        <nav class="nav-group">
            <div class="nav-item active" onclick="loadFiles('root')">
                <i data-lucide="folder"></i> All Files
            </div>
            <div class="nav-item">
                <i data-lucide="star"></i> Starred
            </div>
            <div class="nav-item">
                <i data-lucide="clock"></i> Recent
            </div>
            <div class="nav-item" id="logout-btn">
                <i data-lucide="log-out"></i> Logout
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content hidden">
        <header class="toolbar">
            <input type="text" class="search-bar" placeholder="Search your files...">
            <div class="actions">
                <button class="btn btn-outline" id="sync-btn"><i data-lucide="refresh-cw"></i> <span>Sync TG</span></button>
                <button class="btn btn-outline" id="view-toggle-btn"><i data-lucide="layout-grid"></i> <span>Grid View</span></button>
                <button class="btn btn-outline" id="new-folder-btn"><i data-lucide="folder-plus"></i> <span>New Folder</span></button>
                <label for="file-upload" class="btn btn-primary"><span class="sweep-effect"></span> <i data-lucide="upload-cloud"></i> <span>Upload</span></label>
                <input type="file" id="file-upload" class="hidden">
            </div>
        </header>

        <div class="explorer-header">
            <div class="breadcrumbs" id="breadcrumbs">
                <span>My Drive</span>
            </div>
        </div>

        <!-- File List Container (Dynamic Grid or List) -->
        <div id="file-container" class="file-grid">
            <!-- Items injected here -->
        </div>
    </main>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu hidden">
        <div class="menu-item" id="menu-download"><i data-lucide="download"></i> Download</div>
        <div class="menu-item" id="menu-open"><i data-lucide="external-link"></i> Open</div>
        <div class="menu-item delete" id="menu-delete"><i data-lucide="trash-2"></i> Delete</div>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    TELE<span>NOVA</span>
                </div>
                <h2>Neural Uplink</h2>
                <p>Connect to the Telegram cloud network</p>
            </div>

            <div class="auth-progress">
                <div class="progress-step active" id="p-step-1">1</div>
                <div class="progress-line"></div>
                <div class="progress-step" id="p-step-2">2</div>
                <div class="progress-line"></div>
                <div class="progress-step" id="p-step-3">3</div>
            </div>
            
            <div id="step-init" class="auth-step">
                <div class="auth-input-group">
                    <label>Telegram API ID</label>
                    <input type="text" id="api-id-input" placeholder="Get from my.telegram.org" class="auth-input">
                    <span class="input-hint">Your unique application ID</span>
                </div>
                <div class="auth-input-group">
                    <label>Telegram API Hash</label>
                    <input type="text" id="api-hash-input" placeholder="Your secret API hash" class="auth-input">
                    <span class="input-hint">Used to secure your connection</span>
                </div>
                <button id="init-btn" class="btn btn-primary btn-block"><span class="sweep-effect"></span> Initialize Setup</button>
            </div>

            <div id="step-phone" class="auth-step hidden">
                <div class="auth-input-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone-input" placeholder="+1234567890" class="auth-input">
                    <span class="input-hint">Include country code (e.g., +1 for US)</span>
                </div>
                <button id="send-code-btn" class="btn btn-primary btn-block"><span class="sweep-effect"></span> Request Access Code</button>
            </div>

            <div id="step-verify" class="auth-step hidden">
                <div class="auth-input-group">
                    <label>Verification Code</label>
                    <input type="text" id="code-input" placeholder="Check your Telegram app" class="auth-input">
                </div>
                <div class="auth-input-group">
                    <label>Two-Factor Password</label>
                    <input type="password" id="password-input" placeholder="Only if 2FA is enabled" class="auth-input">
                    <span class="input-hint">Your private security layer</span>
                </div>
                <button id="login-btn" class="btn btn-primary btn-block"><span class="sweep-effect"></span> Establish Uplink</button>
            </div>

            <div id="auth-status" class="auth-status">
                READY_FOR_SYNC
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
